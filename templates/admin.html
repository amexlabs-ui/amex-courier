@app.route("/admin")
def admin():
    if not session.get("admin"):
        return redirect("/login")

    try:
        conn = get_db()
        shipments = conn.execute("SELECT * FROM shipments").fetchall()
        conn.close()

        return render_template("admin.html", shipments=shipments)

    except Exception as e:
        return f"ADMIN ERROR: {str(e)}"
