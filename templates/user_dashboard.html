<link rel="stylesheet" href="/static/style.css">

<div class="container">
<h2>Your Shipments</h2>

{% for s in shipments %}
<div class="card">
<h3>{{ s[1] }}</h3>
<p>Status: {{ s[6] }}</p>
<p>Location: {{ s[7] }}</p>

<iframe width="100%" height="250"
src="https://maps.google.com/maps?q={{ s[7] }}&output=embed">
</iframe>
</div>
{% endfor %}

</div>
