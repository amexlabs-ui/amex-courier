<link rel="stylesheet" href="/static/style.css">

<div class="container">

<div class="card">
<h3>Create Shipment</h3>
<form method="POST">
<input name="sender" placeholder="Sender">
<input name="receiver" placeholder="Receiver">
<input name="address" placeholder="Delivery Address">
<input name="location" placeholder="Current Location">
<input name="weight" placeholder="Weight">
<input name="fee" placeholder="Fee">
<select name="status">
<option>In Transit</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>
<button>Create</button>
</form>
</div>

<div class="card">
<h3>All Shipments</h3>

{% for s in shipments %}
<div>
<strong>{{ s[1] }}</strong> - {{ s[2] }} → {{ s[3] }}
<span class="status in-transit">{{ s[5] }}</span>
</div>
{% endfor %}

</div>

</div>
