{% extends "base.html" %}
{% block content %}

<h2>Dashboard</h2>

<div class="card">
<h3>Create Shipment</h3>

<form action="/create" method="POST">
<input name="status" placeholder="Status (In Transit)" required>
<input name="location" placeholder="Location (London)" required>
<button>Create</button>
</form>
</div>

<table>
<tr>
<th>Tracking</th>
<th>Status</th>
<th>Location</th>
<th>Update</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>

<td>
<form action="/update/{{ row[1] }}" method="POST">
<input name="status" placeholder="New Status" required>
<input name="location" placeholder="New Location" required>
<button>Update</button>
</form>
</td>

</tr>
{% endfor %}
</table>

{% endblock %}
