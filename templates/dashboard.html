<link rel="stylesheet" href="/static/style.css">

<div class="container">

<h2>Admin Dashboard</h2>

<div class="card">
<h3>Create Shipment</h3>
<form method="POST">
<input name="user_id" placeholder="User ID">
<input name="sender">
<input name="receiver">
<input name="address">
<input name="location">
<input name="weight">
<input name="fee">
<select name="status">
<option>In Transit</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>
<button>Create</button>
</form>
</div>

<div class="card">
<h3>Shipments</h3>
{% for s in shipments %}
<div>{{ s[1] }} - {{ s[3] }} ({{ s[5] }})</div>
{% endfor %}
</div>

</div>
