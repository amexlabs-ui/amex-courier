{% extends "base.html" %}
{% block content %}

<h2>Dashboard</h2>

<div class="card">
<h2>Create Shipment</h2>

<form action="/create" method="POST" class="grid">

<input name="status" placeholder="Status (In Transit)">
<input name="location" placeholder="Current Location">

<input name="sender" placeholder="Sender Name">
<input name="receiver" placeholder="Receiver Name">

<input name="sender_address" placeholder="Sender Address">
<input name="receiver_address" placeholder="Receiver Address">

<input name="weight" placeholder="Weight (kg)">
<input name="size" placeholder="Package Size">

<input name="fee" placeholder="Delivery Fee ($)">
<input name="delivery_date" placeholder="Delivery Date">

<textarea name="description" placeholder="Shipment Description"></textarea>

<button>Create Shipment</button>

</form>
</div>

<table>
<tr>
<th>Tracking</th>
<th>Status</th>
<th>Location</th>
<th>Update</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>

<td>
<form action="/update/{{ row[1] }}" method="POST">
<input name="status" placeholder="New Status" required>
<input name="location" placeholder="New Location" required>
<button>Update</button>
</form>
</td>

</tr>
{% endfor %}
</table>

{% endblock %}
