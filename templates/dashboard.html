<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard - Amex Courier</title>
<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
}

.sidebar {
    width: 240px;
    height: 100vh;
    background: #0a2c5e;
    color: white;
    position: fixed;
    left: 0;
    top: 0;
    padding: 24px 20px;
    box-sizing: border-box;
}

.sidebar h2 {
    margin-top: 0;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 10px 0;
    opacity: 0.95;
}

.sidebar a:hover {
    opacity: 0.75;
}

.main {
    margin-left: 260px;
    padding: 30px;
}

.page-title {
    margin-top: 0;
    color: #0a2c5e;
}

.card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.07);
    margin-bottom: 24px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 13px;
    color: #4b5563;
    margin-bottom: 6px;
    font-weight: 500;
}

input, select, textarea {
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
}

textarea {
    min-height: 100px;
    resize: vertical;
}

.full-span {
    grid-column: 1 / -1;
}

.primary-btn {
    grid-column: 1 / -1;
    background: #0a2c5e;
    color: white;
    border: none;
    padding: 13px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.primary-btn:hover {
    background: #08306b;
}

.error-box {
    background: #fee2e2;
    color: #991b1b;
    border: 1px solid #fecaca;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 18px;
}

.success-note {
    font-size: 13px;
    color: #6b7280;
    margin-top: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 14px 10px;
    border-bottom: 1px solid #e5e7eb;
    text-align: left;
    vertical-align: top;
}

th {
    color: #374151;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
}

.status {
    padding: 6px 12px;
    border-radius: 999px;
    color: white;
    font-size: 12px;
    font-weight: 600;
    display: inline-block;
}

.processing { background: #6b7280; }
.in-transit { background: #f59e0b; }
.out-for-delivery { background: #2563eb; }
.delivered { background: #16a34a; }
.cancelled { background: #dc2626; }
.delayed { background: #7c3aed; }

.update-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    align-items: center;
}

.update-form button {
    background: #111827;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 11px 14px;
    cursor: pointer;
}

@media (max-width: 1000px) {
    .sidebar {
        position: static;
        width: 100%;
        height: auto;
    }

    .main {
        margin-left: 0;
    }

    .form-grid,
    .update-form {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Amex Admin</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/">Homepage</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">
    <h1 class="page-title">Admin Dashboard</h1>
    <p class="success-note">
