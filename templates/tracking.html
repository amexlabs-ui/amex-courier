<link rel="stylesheet" href="/static/style.css">

<div class="container">

<div class="card">
{% if data %}
<h2>{{ data[1] }}</h2>
<p>Status: {{ data[6] }}</p>
<p>Location: {{ data[7] }}</p>

<iframe width="100%" height="250"
src="https://maps.google.com/maps?q={{ data[7] }}&output=embed">
</iframe>

{% else %}
<p>Tracking not found</p>
{% endif %}
</div>

</div>
