<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Dashboard</h2>

<form action="/create" method="POST" class="form-box">
<input name="sender" placeholder="Sender" required>
<input name="receiver" placeholder="Receiver" required>
<input name="location" placeholder="Location" required>
<input name="delivery_address" placeholder="Delivery Address" required>

<select name="status">
<option>Processing</option>
<option>In Transit</option>
<option>Delivered</option>
</select>

<button>Create Shipment</button>
</form>

</body>
</html>
