<h3>Map</h3>

{% if shipment %}
<iframe
    width="100%"
    height="300"
    style="border:0"
    loading="lazy"
    allowfullscreen
    src="https://www.google.com/maps?q={{ shipment[3] }}&output=embed">
</iframe>
{% else %}
<p>No location available</p>
{% endif %}</iframe>
{% else %}
<p>No location available</p>
{% endif %}

<h3>Shipment History</h3>

<div class="timeline">
{% for h in history %}
<div class="timeline-item">
<b>{{ h[0] }}</b> - {{ h[1] }} <br>
<small>{{ h[2] }}</small>
</div>
{% endfor %}
</div>

{% else %}
<p>No tracking found</p>
{% endif %}

</div>

{% endblock %}
