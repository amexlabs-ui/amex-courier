<div class="track-box">

{% if data %}

<h2>Tracking: {{ data[1] }}</h2>

<p><strong>Status:</strong> {{ data[6] }}</p>
<p><strong>Location:</strong> {{ data[7] }}</p>
<p><strong>Sender:</strong> {{ data[2] }}</p>
<p><strong>Receiver:</strong> {{ data[3] }}</p>
<p><strong>Weight:</strong> {{ data[4] }}</p>
<p><strong>Fee:</strong> ${{ data[5] }}</p>

{% else %}

<h2 style="color:red;">Tracking Not Found</h2>
<p>Please check your tracking number.</p>

{% endif %}

</div>
