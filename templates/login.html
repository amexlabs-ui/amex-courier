<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Amex Courier</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #0a2c5e, #1e3c72);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTAINER */
.login-container {
    display: flex;
    width: 900px;
    height: 500px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

/* LEFT SIDE */
.login-left {
    flex: 1;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.login-left h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.login-left p {
    opacity: 0.8;
}

/* RIGHT SIDE */
.login-right {
    flex: 1;
    padding: 40px;
}

.login-right h2 {
    margin-bottom: 20px;
}

/* INPUTS */
.input-group {
    margin-bottom: 15px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #0a2c5e;
    color: white;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #06306f;
}

/* LINKS */
.links {
    margin-top: 15px;
    text-align: center;
}

.links a {
    text-decoration: none;
    color: #0a2c5e;
    font-weight: 500;
}

</style>
</head>

<body>

<div class="login-container">

    <!-- LEFT PANEL -->
    <div class="login-left">
        <h1>Welcome Back</h1>
        <p>Login to manage shipments, track deliveries, and access your dashboard.</p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="login-right">
        <h2>Login</h2>

        <form method="POST" action="/login">
            
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>

        </form>

        <div class="links">
            <p>Don't have an account? <a href="/register">Register</a></p>
        </div>
    </div>

</div>

</body>
</html>
