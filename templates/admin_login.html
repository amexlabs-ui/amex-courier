<!DOCTYPE html>
<html>
<head>
<title>Login - Amex Courier</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0d6efd, #001f3f);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 300px;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}
button {
    width: 100%;
    padding: 10px;
    background: #0d6efd;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="box">
<h2>Admin Login</h2>

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

</body>
</html>
